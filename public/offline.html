<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocLear — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      color: #1F2937;
      padding: 24px;
    }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6B7280; font-size: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📄</div>
    <h1>No internet connection</h1>
    <p>Your documents are saved locally. Document analysis will be available when you reconnect.</p>
  </div>
</body>
</html>
